<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard Tim Desain</title>
    <style>
        /* Reset total biar gak ada spasi sisa */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden; /* Menghilangkan scrollbar di pembungkus luar */
            background-color: #000; /* Warna background cadangan */
        }

        /* Styling Iframe agar Full Screen */
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <iframe 
        src="https://script.google.com/macros/s/AKfycbyiAZlCgz22MYF_WSQfsz81eKhzFXV7ZRxQ4ZsJB-G2z7g3IWaskdOhlRW79Q9yfBor/exec" 
        allowfullscreen>
    </iframe>

</body>
</html>
